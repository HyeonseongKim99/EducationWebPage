services:
  education-web:
    image: ghcr.io/hyeonseongkim99/educationwebpage:latest
    container_name: education-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - "${COURSES_PATH}:/srv/courses:ro"
      - "${AUTH_PATH}:/srv/auth:ro"
    environment:
      SITE_URL: "${SITE_URL:-http://localhost}"
      SESSION_TTL_HOURS: "${SESSION_TTL_HOURS:-12}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-auto}"
    security_opt:
      - no-new-privileges:true
